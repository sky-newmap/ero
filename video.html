<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery - Adult Style</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            font-size: 1.2rem;
            border-left: 4px solid #ffcc00;
            padding-left: 10px;
            margin-bottom: 20px;
            color: #fff;
        }

        .video-grid {
            display: grid;
            /* スマホで2列、PCで3〜4列に自動調整 */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .video-item {
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
        }

        .video-item:hover {
            opacity: 0.8;
        }

        .thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        video, img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* サムネイルのビデオはクリック無効 */
        .thumbnail video {
            pointer-events: none; 
        }

        .title {
            padding: 8px;
            font-size: 13px;
            line-height: 1.4;
            height: 3em;
            overflow: hidden;
            color: #ccc;
            display: block;
        }

        .ad-item {
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 150px;
            border: 1px solid #444;
        }

        @media (min-width: 600px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>新着動画</h2>

    <div class="video-grid">
        
        <a href="watch.html" class="video-item">
            <div class="thumbnail">

                    <source src="RPReplay_Final1760849560.mov#t=0.5" type="video/quicktime">
                </video>
            </div>
            <span class="title">エロい女に中出し！！</span>
        </a>

        <div class="video-item ad-item">
            <script src="https://adm.shinobi.jp/s/e4ebe0c3c99e2412efff862a0a5d534c"></script>
        </div>

        <a href="#" class="video-item">
            <div class="thumbnail">
                <img src="https://via.placeholder.com/320x180/333/fff?text=Video+3">
            </div>
            <span class="title">ここに動画のタイトルが入ります。</span>
        </a>

        <a href="#" class="video-item">
            <div class="thumbnail">
                <img src="https://via.placeholder.com/320x180/333/fff?text=Video+4">
            </div>
            <span class="title">最新の投稿動画はこちら。</span>
        </a>

        <a href="#" class="video-item">
            <div class="thumbnail">
                <img src="https://via.placeholder.com/320x180/333/fff?text=Video+5">
            </div>
            <span class="title">おすすめの人気動画コンテンツ。</span>
        </a>

        <a href="#" class="video-item">
            <div class="thumbnail">
                <img src="https://via.placeholder.com/320x180/333/fff?text=Video+6">
            </div>
            <span class="title">スマホで見やすいレイアウト。</span>
        </a>

        <a href="#" class="video-item">

            </div>

        </a>

        <a href="#" class="video-item">

            </div>
            <span class="title">クリックして再生ページへ移動。</span>
        </a>

    </div>
</div>

</body>
</html>
